<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>From Malhar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* prevents scroll */
}

body {
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #ffe0f0, #e0c3fc);
    position: relative;
}

#app-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden; /* all animations contained */
}

.landing {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, #fdfbfb, #ebedee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.8s ease;
    width: 100%;
    padding: 0 10px;
}

.landing-text {
    font-size: clamp(12px, 4vw, 14px);
    color: #888;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    text-align: center;
}
@keyframes fadeIn { to { opacity: 1; } }
.landing-text::after {
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: #bbb;
    margin: 10px auto 0;
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity:0.3; transform:scaleX(0.8); } 50% { opacity:1; transform:scaleX(1); } }

.message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    width: 90%;
    max-width: 500px;
    text-align: center;
    opacity: 0;
    transition: all 1s cubic-bezier(0.22,1,0.36,1);
}
.show { opacity:1; transform:translate(-50%, -50%) scale(1); }

.text-stack { display:flex; flex-direction:column; align-items:center; gap:10px; min-height:140px; }

.message h1 { 
    font-family:'Great Vibes', cursive; 
    font-size:clamp(28px,7vw,60px); 
    color:#ff4da6; 
    text-shadow:0 0 20px rgba(255,77,166,0.4); 
}
.message p { 
    font-size:clamp(13px,3.8vw,17px); 
    color:#555; margin:0; max-width:100%; 
}

#start-btn { 
    margin-top:20px; 
    padding:10px 20px; 
    font-size:clamp(14px,4vw,16px); 
    font-family:'Poppins',sans-serif; 
    background-color:#ff4da6; color:white; 
    border:none; border-radius:24px; cursor:pointer; 
    transition:transform 0.2s ease, background-color 0.3s ease; 
}
#start-btn:hover { transform:scale(1.05); background-color:#ff66b3; }

#balloon-counter {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: clamp(14px,4vw,18px);
    color: #ff4da6;
    background: rgba(255,255,255,0.8);
    padding: 6px 10px;
    border-radius: 10px;
    display: none;
}

#balloon-game, #orbs-container, #confetti-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* contained animation */
    pointer-events: none;
}

.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.4;
    animation: floatOrb linear infinite;
    max-width: 150px;
    max-height: 150px;
}

@keyframes floatOrb { 0%{transform:translateY(120%);} 100%{transform:translateY(-20%);} }

.confetti, .popper-piece, .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
}

.balloon {
    position: absolute;
    border-radius:50%;
    cursor:pointer;
    display:flex; justify-content:center; align-items:center;
    font-size:clamp(16px,6vw,24px); color:white; font-weight:bold;
    user-select:none;
    transition: transform 0.2s ease;
}
.balloon::after { content:""; position:absolute; width:2px; height:20px; bottom:-20px; background:#444; }

@media(max-width:600px){
    .balloon { font-size: clamp(14px,8vw,20px); }
    #start-btn { padding:8px 16px; font-size:14px; }
    #balloon-counter { font-size:14px; padding:5px 8px; }
}
</style>
</head>
<body>
<div id="app-container">

    <div id="orbs-container"></div>
    <div class="landing" id="landing"><div class="landing-text">tap here</div></div>

    <div class="message" id="message">
        <div class="text-stack">
            <h1 id="title"></h1>
            <p id="line1" class="fade-line"></p>
            <p id="line2" class="fade-line"></p>
            <button id="start-btn" style="display:none;">Start Balloon Game 🎈</button>
        </div>
    </div>

    <div id="balloon-game"></div>
    <div id="balloon-counter">Popped: 0/0</div>
    <div id="confetti-container"></div>
</div>

<script>
// Set real vh
function setRealHeight(){document.documentElement.style.setProperty('--vh',window.innerHeight*0.01+'px');}
setRealHeight(); window.addEventListener('resize',setRealHeight);

// Elements
const landing = document.getElementById("landing");
const message = document.getElementById("message");
const title = document.getElementById("title");
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");
const startBtn = document.getElementById("start-btn");
const balloonGame = document.getElementById("balloon-game");
const balloonCounter = document.getElementById("balloon-counter");
const orbsContainer = document.getElementById("orbs-container");
const confettiContainer = document.getElementById("confetti-container");

const name = "Khushi";

// Create orbs
for(let i=0;i<6;i++){
    let o = document.createElement('div');
    o.className='orb';
    let size=Math.random()*100+50;
    o.style.width=size+'px';
    o.style.height=size+'px';
    o.style.left=Math.random()*80+'vw';
    o.style.top=Math.random()*80+'vh';
    o.style.background=`radial-gradient(circle, rgba(255,192,203,0.6), transparent)`;
    o.style.animationDuration=(Math.random()*20+10)+'s';
    orbsContainer.appendChild(o);
}

// Landing click
landing.addEventListener("click",()=>{
    landing.style.opacity=0;
    setTimeout(()=>{landing.style.display='none'; message.classList.add('show'); stage1();},800);
});

function stage1(){title.innerHTML="Hey... something special for you 💫"; setTimeout(stage2,2200);}
function stage2(){typeText(title,`Happy Birthday ${name} 🎉`,60,stage3);}
function stage3(){line1.innerHTML="Wishing you a day filled with happiness and magic ✨"; line1.classList.add("fade-in"); setTimeout(stage4,2600);}
function stage4(){line2.innerHTML="You make the world brighter just by being in it 💫"; line2.classList.add("fade-in"); setTimeout(()=>{startBtn.style.display='inline-block';},400);}

function typeText(e,t,s,c){e.innerHTML="";let i=0;let cursor=document.createElement("span");cursor.className="cursor";cursor.innerHTML="|";e.appendChild(cursor);function type(){if(i<t.length){e.insertBefore(document.createTextNode(t[i]),cursor);i++;setTimeout(type,s);}else{cursor.remove();if(c)c();}}type();}

// Balloon Game
let balloonCount=8, poppedCount=0, balloonTimeout, gameEnded=false;
startBtn.addEventListener("click",()=>{ startBtn.style.display='none'; startBalloonGame(); });

function startBalloonGame(){
    balloonCount=8; poppedCount=0; balloonGame.style.pointerEvents='auto';
    balloonCounter.style.display='block'; updateCounter();
    for(let i=0;i<balloonCount;i++) createBalloon();
    balloonTimeout=setTimeout(()=>{ endBalloonGame(); },60000);
}

function createBalloon(){
    let b = document.createElement('div');
    b.className='balloon';
    let colors=["#ff4da6","#ffb347","#4da6ff","#8cff66"];
    b.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
    b.style.left = Math.random()*80+'vw';
    b.style.bottom='-10%';
    balloonGame.appendChild(b);
    setTimeout(()=>{ b.style.bottom='90%'; },50);
    b.addEventListener('click', ()=>{
        poppedCount++; b.remove(); updateCounter();
        if(balloonGame.children.length===0) endBalloonGame();
    });
    setTimeout(()=>{ if(balloonGame.contains(b)) b.remove(); }, 15000);
}

function updateCounter(){ balloonCounter.textContent=`Popped: ${poppedCount}/${balloonCount}`; }

function endBalloonGame(){
    gameEnded=true;
    balloonGame.style.pointerEvents='none';
    balloonCounter.style.display='none';
    balloonGame.innerHTML='';
}
</script>
</body>
</html>
