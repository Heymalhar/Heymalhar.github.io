<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #ffe0f0, #e0c3fc);
}

/* ===== LANDING ===== */
.landing {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #fdfbfb, #ebedee);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.8s ease;
}

.landing-text {
    font-size: 16px;
    color: #888;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.landing-text::after {
    content: "";
    display: block;
    width: 40px;
    height: 1px;
    background: #bbb;
    margin: 10px auto 0;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 0.3; transform: scaleX(0.8); }
    50% { opacity: 1; transform: scaleX(1); }
}

/* ===== ORBS ===== */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.4;
    animation: floatOrb linear infinite;
}

@keyframes floatOrb {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* ===== MESSAGE ===== */
.message {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 40%;
    transform: translateY(-50%) scale(0.85);
    opacity: 0;
    transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
}

.show {
    opacity: 1;
    transform: translateY(-50%) scale(1);
}

/* ===== TEXT STACK ===== */
.text-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-height: 160px;
}

/* Title */
.message h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: #ff4da6;
    text-shadow: 0 0 20px rgba(255, 77, 166, 0.4);
}

/* Lines */
.message p {
    font-size: 18px;
    color: #555;
    margin: 0;
}

/* Reserve space */
#line1, #line2 {
    height: 24px;
}

/* Fade lines */
.fade-line {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1),
                transform 1s cubic-bezier(0.22, 1, 0.36, 1);
}

.fade-in {
    opacity: 1;
    transform: translateY(0);
}

/* Cursor */
.cursor {
    display: inline-block;
    margin-left: 4px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
}

/* Confetti */
.confetti {
    position: absolute;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: sparkleFade 1s linear forwards;
}

@keyframes sparkleFade {
    to { transform: scale(2); opacity: 0; }
}

/* Popper */
.popper-piece {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: burst 1s ease-out forwards;
}

@keyframes burst {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="landing" id="landing">
    <div class="landing-text">tap here</div>
</div>

<div class="message" id="message">
    <div class="text-stack">
        <h1 id="title"></h1>
        <p id="line1" class="fade-line"></p>
        <p id="line2" class="fade-line"></p>
    </div>
</div>

<script>
const landing = document.getElementById("landing");
const message = document.getElementById("message");
const title = document.getElementById("title");
const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");

const name = "Aarav";

createOrbs();

/* FLOW */
landing.addEventListener("click", startExperience);

function startExperience() {
    landing.style.opacity = "0";

    setTimeout(() => {
        landing.style.display = "none";
        message.classList.add("show");
        stage1();
    }, 800);
}

/* Stage 1 */
function stage1() {
    title.innerHTML = "Hey... something special for you 💫";
    setTimeout(stage2, 2200);
}

/* Stage 2 (Typing Effect) */
function stage2() {
    typeText(title, `Happy Birthday ${name} 🎉`, 60, stage3);
}

/* Stage 3 */
function stage3() {
    line1.innerHTML = "Wishing you a day filled with happiness and magic ✨";

    requestAnimationFrame(() => {
        line1.classList.add("fade-in");
        createMiniBurst(line1);
    });

    setTimeout(stage4, 2600);
}

/* Stage 4 */
function stage4() {
    line2.innerHTML = "You make the world brighter just by being in it 💫";

    requestAnimationFrame(() => {
        line2.classList.add("fade-in");
        createMiniBurst(line2);
    });

    setTimeout(() => {
        partyPopperBurst();
        startConfetti();
    }, 400);

    setTimeout(() => {
        message.style.opacity = "0.7";
    }, 6000);
}

/* Typing Function */
function typeText(element, text, speed, callback) {
    element.innerHTML = "";
    let i = 0;

    let cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.innerHTML = "|";
    element.appendChild(cursor);

    function type() {
        if (i < text.length) {
            element.insertBefore(document.createTextNode(text.charAt(i)), cursor);
            i++;
            setTimeout(type, speed);
        } else {
            cursor.remove();
            if (callback) callback();
        }
    }
    type();
}

/* Orbs */
function createOrbs() {
    for (let i = 0; i < 6; i++) {
        let orb = document.createElement("div");
        orb.classList.add("orb");

        let size = Math.random() * 200 + 100;

        orb.style.width = size + "px";
        orb.style.height = size + "px";
        orb.style.left = Math.random() * 100 + "vw";
        orb.style.background =
            `radial-gradient(circle, rgba(255,192,203,0.6), transparent)`;
        orb.style.animationDuration =
            (Math.random() * 20 + 10) + "s";

        document.body.appendChild(orb);
    }
}

/* Confetti */
function startConfetti() {
    setInterval(() => {
        let c = document.createElement("div");
        c.classList.add("confetti");

        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor =
            `hsl(${Math.random() * 360},100%,50%)`;

        c.style.width = (Math.random() * 6 + 4) + "px";
        c.style.height = c.style.width;
        c.style.opacity = Math.random();

        c.style.animationDuration =
            (Math.random()*3+2)+"s";

        document.body.appendChild(c);

        createSparkle(c);

        setTimeout(()=>c.remove(),5000);
    },120);
}

/* Mini Burst */
function createMiniBurst(element) {
    let rect = element.getBoundingClientRect();

    for (let i = 0; i < 10; i++) {
        let s = document.createElement("div");
        s.classList.add("sparkle");

        s.style.left = rect.left + rect.width / 2 + "px";
        s.style.top = rect.top + "px";

        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
    }
}

/* Sparkles */
function createSparkle(parent) {
    let s = document.createElement("div");
    s.classList.add("sparkle");

    s.style.left = parent.style.left;
    s.style.top = "50%";

    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
}

/* Popper */
function partyPopperBurst() {
    for (let i = 0; i < 40; i++) {
        let p = document.createElement("div");
        p.classList.add("popper-piece");

        p.style.setProperty('--x',(Math.random()-0.5)*400+"px");
        p.style.setProperty('--y',(Math.random()-0.5)*400+"px");

        p.style.left="50%";
        p.style.top="50%";
        p.style.backgroundColor =
            `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1000);
    }
}
</script>

</body>
</html>
